name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  # We deliberately do not lint the generated cask. Casks/catalog.rb is
  # produced by GoReleaser's homebrew_casks template during catalog's release,
  # and that template's output does not satisfy `brew style` (the linter
  # Homebrew runs on casks submitted to the official homebrew-cask repo). The
  # cosmetic offenses it raises — a blank line before the closing `end`, array
  # indentation in stanzas like `zap` — are inherent to the generated output,
  # not mistakes we can fix here without hand-editing a generated file.
  #
  # GoReleaser-published taps (k9s, GoReleaser's own) run no CI on their
  # generated files for exactly this reason: there is nothing a human authored
  # to get wrong. If we ever want a real smoke test, the right one is an
  # install test (`brew install westarete/tap/catalog && catalog --version`),
  # which checks that the binary installs and runs — not its formatting.

  # Checks that all Markdown files are formatted with Prettier and pass markdownlint.
  markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - run: npx prettier --check "**/*.md"

      - run: npx markdownlint-cli2 "**/*.md"
