name: brew test-bot

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  # Runs brew test-bot --only-tap-syntax on macOS to validate that cask files
  # are valid Ruby and conform to Homebrew's cask conventions (desc length,
  # no trailing period, no extra blank lines, etc.).
  #
  # We skip setup-homebrew (Homebrew's official CI action) because it runs
  # brew update unconditionally, which fails under Homebrew 6's trust model
  # when the runner has pre-installed untrusted taps (aws/tap, azure/bicep).
  #
  # There is no actions/checkout step. brew test-bot clones the tap directly
  # from GitHub at the commit being tested — it ignores any pre-checked-out
  # copy in the workspace. This is by design: test-bot is built to run in
  # Homebrew's own CI where it owns the environment. You can see it happen in
  # the logs: "Tapping westarete/tap / Cloning into ...".
  #
  # Linux is intentionally absent. --only-tap-syntax checks Ruby syntax and
  # style rules, which are platform-independent. The macOS job covers this.
  # The Homebrew Linux container also has filesystem permission conflicts with
  # the GitHub Actions runner that make test-bot fail. If you ever need to
  # verify the Linux binary actually installs, that requires a different test.
  #
  # Intel Mac (macos-15-intel) is intentionally absent — we only support Apple
  # Silicon. Add it back if Intel compatibility is ever needed.
  test-bot:
    runs-on: macos-26
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: read
    steps:
      # brew style (called by --only-tap-syntax) runs actionlint on any workflow
      # files it finds. actionlint is not pre-installed on the runner, so we
      # install it first. Without it, brew style cancels the operation entirely.
      - name: Install actionlint
        run: brew install actionlint

      # Checks that all cask files are valid Ruby and follow Homebrew's cask style rules.
      - run: brew test-bot --only-tap-syntax

  # Checks that all Markdown files are formatted with Prettier and pass markdownlint.
  markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - run: npx prettier --check "**/*.md"

      - run: npx markdownlint-cli2 "**/*.md"
